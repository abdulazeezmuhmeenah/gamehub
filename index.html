<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewpoint" content="width=device-width", initial-scale="1.0">
        <title>Game Hub</title>
        <link rel="stylesheet" href="css/style.css">
    </head>

    <boby>
        <nav>
            <h1>GameHub</h1>
            <input id="search" type="text" placeholder="Search Games...">
        </nav>

        <header class="hero">
            <h2>Play Premium HTML5 Games</h2>
            <p>Instant Play, No Downloads, Powered By GameMontize Feed</p>
        </header>
        <section class="categories">
            <button onclick="filterCategory('All')">All</button>
            <button onclick="filterCategory('Racing')">Racing</button>
            <button onclick="filterCategory('Puzzles')">Puzzles</button>
            <button onclick="filterCategory('Arcade')">Arcade</button>
            <button onclick="filterCategory('Shooting')">Shooting</button>
            <button onclick="filterCategory('Soccer')">Soccer</button>
        </section>
        <main id="gameContainer" class="grid"></main>

        <script src="js/app.js"></script>
    </boby>
</html>
